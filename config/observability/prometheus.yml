global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: agentgateway
    metrics_path: /metrics
    # agentgateway serves Prometheus metrics on the stats listener (config.statsAddr),
    # which is pinned to :15020. The admin UI/API is on :15000 and does NOT serve /metrics.
    static_configs:
      - targets: ["host.docker.internal:15020"]
