apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-llm
  namespace: agentgateway-demo
spec:
  parentRefs:
    - name: local-agentgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        # CRD group is agentgateway.dev (NOT gateway.agentgateway.dev). No port:
        # AgentgatewayBackend is not a Service, so the backendRef port is omitted.
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: ollama-local
