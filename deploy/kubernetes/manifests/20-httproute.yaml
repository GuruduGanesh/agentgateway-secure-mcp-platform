apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-llm
  namespace: agentgateway-demo
spec:
  parentRefs:
    - name: local-agentgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: gateway.agentgateway.dev
          kind: AgentgatewayBackend
          name: ollama-local
          port: 80
